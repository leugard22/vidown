name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
            echo "RELEASE_STORE_FILE=../release.jks" >> local.properties
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> local.properties
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> local.properties
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> local.properties
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Extract Release Notes
        id: extract_notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ -f CHANGELOG.md ]; then
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' > release_notes.md
          else
            echo "Release of Vidown v${VERSION}" > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk/release/
          for file in app-*-release*.apk; do
            mv "$file" "${file/app-/vidown-}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vidown v${{ github.ref_name }}
          files: app/build/outputs/apk/release/vidown-*-release*.apk
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
